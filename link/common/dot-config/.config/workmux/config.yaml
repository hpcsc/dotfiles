# workmux global configuration — applies to every repo.
# Per-repo .workmux.yaml overrides these. Full reference: `workmux config reference`.

agent: claude

worktree_dir: .worktrees

# One tmux session per worktree, not a window inside the current session.
mode: session

# Drop the default "wm-" prefix so a worktree's tmux session is named exactly
# after its handle (e.g. handle "dotfiles-test" -> session "dotfiles-test").
window_prefix: ""

# Each worktree session: full agent pane + small shell pane below.
# Live status icons (🤖 working / 💬 waiting / ✅ done) show in the dashboard.
panes:
  - command: <agent>
    focus: true
  - split: vertical
    size: 20
nerdfont: true
