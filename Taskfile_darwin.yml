version: '3'

vars:
  SCRIPT_DIR: ./scripts

tasks:
  base:
    desc: macOS base setup (keep-sudo -> brew-bundle -> stow-macos)
    run: once
    cmds:
      - task: keep-sudo
      - task: brew-bundle
      - task: stow-macos

  settings:
    desc: macOS final settings (run last)
    run: once
    interactive: true
    cmds:
      - "{{.SCRIPT_DIR}}/_run_with_logging.sh {{.SCRIPT_DIR}}/macos-settings.sh"

  keep-sudo:
    run: once
    interactive: true
    cmds:
      - "{{.SCRIPT_DIR}}/_run_with_logging.sh {{.SCRIPT_DIR}}/macos-keep-sudo.sh"

  brew-bundle:
    run: once
    deps:
      - keep-sudo
    interactive: true
    cmds:
      - "{{.SCRIPT_DIR}}/_run_with_logging.sh {{.SCRIPT_DIR}}/macos-brew-bundle.sh"

  stow-macos:
    run: once
    deps:
      - brew-bundle
    interactive: true
    cmds:
      - "{{.SCRIPT_DIR}}/_run_with_logging.sh {{.SCRIPT_DIR}}/macos-stow.sh"

  alfred-keymaps:
    desc: Build the Keymaps Alfred workflow bundle (others/macos/alfred/keymaps)
    dir: others/macos/alfred/keymaps
    sources:
      - info.plist
      - keymaps.sh
      - keymaps.tsv
    generates:
      - Keymaps.alfredworkflow
    cmds:
      - plutil -lint info.plist
      - rm -f Keymaps.alfredworkflow
      - zip -X -q Keymaps.alfredworkflow info.plist keymaps.sh keymaps.tsv
      - 'echo "Built $(pwd)/Keymaps.alfredworkflow - double-click to import into Alfred"'
