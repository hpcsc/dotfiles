version: '3'

vars:
  SCRIPT_DIR: ./scripts

tasks:
  base:
    desc: macOS base setup (keep-sudo -> brew-bundle -> stow-macos)
    run: once
    cmds:
      - task: keep-sudo
      - task: brew-bundle
      - task: stow-macos

  settings:
    desc: macOS final settings (run last)
    run: once
    cmds:
      - source "{{.SCRIPT_DIR}}/macos-settings.sh"

  haskell:
    desc: Install Haskell (optional)
    interactive: true
    cmds:
      - "{{.SCRIPT_DIR}}/_run_with_logging.sh {{.SCRIPT_DIR}}/macos-haskell.sh"

  dry-run:
    desc: Show macOS-specific tasks that would run
    silent: true
    cmds:
      - |
          cat <<EOF
          === macOS tasks that would run ===
          base: keep-sudo, brew-bundle, stow-macos (sequential)
          settings: macos-settings.sh (run last)
          optional: haskell (available on demand)
          EOF

  keep-sudo:
    run: once
    interactive: true
    cmds:
      - "{{.SCRIPT_DIR}}/_run_with_logging.sh {{.SCRIPT_DIR}}/macos-keep-sudo.sh"

  brew-bundle:
    run: once
    deps:
      - keep-sudo
    interactive: true
    cmds:
      - "{{.SCRIPT_DIR}}/_run_with_logging.sh {{.SCRIPT_DIR}}/macos-brew-bundle.sh"

  stow-macos:
    run: once
    deps:
      - brew-bundle
    interactive: true
    cmds:
      - "{{.SCRIPT_DIR}}/_run_with_logging.sh {{.SCRIPT_DIR}}/macos-stow.sh"
